name: Update Skill Index

# Incremental-only. A from-scratch full crawl cannot run here: all crawlers
# share the single Actions GITHUB_TOKEN (5,000 REST req/hr, ~10/min code-search),
# so fetching the ~37k-skill corpus needs many hours of quota — far beyond any
# runner budget. Full index builds are therefore done LOCALLY and published
# manually (see skills/update-index + docs/prd/PRD-005). This job only *appends*
# newly-discovered skills to the latest index release, and gracefully no-ops
# (green) when that is not possible — e.g. the production index is an
# IndexIVFScalarQuantizer (>= 30k vectors) whose centroids cannot be updated
# incrementally, so it can only be refreshed by a local full rebuild.

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  incremental-update:
    runs-on: ubuntu-latest
    # Incremental embed is small (only new skills), so the multi-hour full-embed
    # budget is gone. Per-crawler timeouts keep the crawl bounded well under this.
    timeout-minutes: 60
    permissions:
      contents: write   # needed to publish GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # ── Locate the index release to update ────────────────────────────────
      # Scope to index-* tags; npm releases (v0.1.x) carry no index asset.
      - name: Find latest index release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(gh release list \
              --repo "${{ github.repository }}" \
              --limit 100 --json tagName -q '.[].tagName' \
            | grep '^index-' | sort -r | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "::notice::No index-* release exists yet. Seed a full index locally and publish it first (see skills/update-index); incremental CI has nothing to update."
            echo "SKIP=true" >> "$GITHUB_ENV"
          else
            echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"
            echo "Updating on top of $PREV_TAG"
          fi

      - name: Download previous index
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          gh release download "${{ env.PREV_TAG }}" \
            --pattern "*.tar.gz" \
            --dir /tmp/prev-index \
            --repo "${{ github.repository }}"
          tar -xzf /tmp/prev-index/*.tar.gz -C data/
          echo "Previous index: $(wc -l < data/metadata.jsonl) skills"

      # ── Bail out (green) when the index can't be appended to ──────────────
      # IndexIVFScalarQuantizer (>= IVF_THRESHOLD vectors) has trained centroids
      # that cannot accept incremental adds. This is the steady state for the
      # production corpus, so this job is a deliberate no-op until a local full
      # rebuild lowers the count or the index type changes.
      - name: Check index supports incremental append
        if: env.SKIP != 'true'
        run: |
          NTOTAL=$(python -c "import faiss; print(faiss.read_index('data/index.faiss').ntotal)")
          THRESHOLD=$(python -c "from pipeline.build_index import IVF_THRESHOLD; print(IVF_THRESHOLD)")
          echo "Index has $NTOTAL vectors (IVF threshold: $THRESHOLD)"
          if [ "$NTOTAL" -ge "$THRESHOLD" ]; then
            echo "::notice::Index has $NTOTAL vectors (>= $THRESHOLD): an IVF index whose centroids cannot be updated incrementally. Refresh it with a local full rebuild (see skills/update-index). Skipping."
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      # ── Incremental crawl: discover repos new since the last index ────────
      # Best-effort under CI rate limits; each crawler is bounded by `timeout`
      # and `|| echo` so one slow/hung source can never stall `wait`. Only the
      # subset not already in the index is embedded and appended below.
      - name: Crawl new skills (incremental)
        if: env.SKIP != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/raw
          timeout 20m python -m crawlers.skillsmp_crawler    -o data/raw/skillsmp.jsonl    --mode discover || echo "::warning::skillsmp crawler exited $?" &
          timeout 20m python -m crawlers.clawhub_crawler     -o data/raw/clawhub.jsonl     --mode discover || echo "::warning::clawhub crawler exited $?" &
          timeout 20m python -m crawlers.skillhub_crawler    -o data/raw/skillhub.jsonl    --mode discover || echo "::warning::skillhub crawler exited $?" &
          timeout 20m python -m crawlers.marketplace_crawler -o data/raw/marketplace.jsonl --mode discover || echo "::warning::marketplace crawler exited $?" &
          timeout 20m python -m crawlers.topic_crawler       -o data/raw/topic.jsonl --data-dir data/raw --mode discover || echo "::warning::topic crawler exited $?" &
          wait
          echo "Crawl record counts:"
          for f in data/raw/*.jsonl; do echo "  $(wc -l < "$f") $(basename "$f")"; done

      - name: Normalize and deduplicate
        if: env.SKIP != 'true'
        run: |
          python pipeline/normalize.py \
            data/raw/skillsmp.jsonl data/raw/clawhub.jsonl \
            data/raw/skillhub.jsonl data/raw/marketplace.jsonl \
            data/raw/topic.jsonl \
            -o data/unified_skills.jsonl \
            --min-skills 1

      - name: Install Ollama and pull embedding model
        if: env.SKIP != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then break; fi
            if [ "$i" -eq 30 ]; then echo "::error::Ollama did not start"; exit 1; fi
            sleep 1
          done
          ollama pull qwen3-embedding:0.6b

      # ── Embed only the new skills and append them to the index ────────────
      # incremental_update.py exits 2 if the index can't be appended to (a race
      # with the size check above, or a model mismatch); treat that as a no-op.
      - name: Incremental embed and append
        if: env.SKIP != 'true'
        run: |
          set +e
          python pipeline/incremental_update.py \
            --new-skills data/unified_skills.jsonl \
            --index      data/index.faiss \
            --metadata   data/metadata.jsonl \
            --version    data/version.txt
          rc=$?
          set -e
          if [ "$rc" -eq 2 ]; then
            echo "::notice::Incremental append not supported for this index — full rebuild required (done locally). Skipping."
            echo "SKIP=true" >> "$GITHUB_ENV"
          elif [ "$rc" -ne 0 ]; then
            exit "$rc"
          fi
          echo "FINAL_COUNT=$(wc -l < data/metadata.jsonl)" >> "$GITHUB_ENV"

      # ── Publish only if skills were actually added ────────────────────────
      - name: Package artifact
        if: env.SKIP != 'true'
        run: |
          PREV=$(echo "${{ env.PREV_TAG }}" | sed 's/^index-//')
          NEW_COUNT="${{ env.FINAL_COUNT }}"
          # No-op if the count did not change (no new skills appended).
          PREV_COUNT=$(tar -xzOf /tmp/prev-index/*.tar.gz data/metadata.jsonl 2>/dev/null | wc -l || echo 0)
          if [ "$NEW_COUNT" = "$PREV_COUNT" ]; then
            echo "::notice::No new skills appended ($NEW_COUNT unchanged). Nothing to publish."
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          DATE=$(date +%Y%m%d)
          ARTIFACT="skill-finder-index-${DATE}.tar.gz"
          tar -czf "$ARTIFACT" data/index.faiss data/metadata.jsonl data/version.txt
          SHA=$(sha256sum "$ARTIFACT" | awk '{print $1}')
          {
            echo "ARTIFACT=$ARTIFACT"
            echo "SHA256=$SHA"
            echo "DATE=$DATE"
            echo "PREV_COUNT=$PREV_COUNT"
          } >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        if: env.SKIP != 'true'
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae  # v2
        with:
          tag_name: index-${{ env.DATE }}
          name: Skill Index ${{ env.DATE }}
          body: |
            ## Skill Index ${{ env.DATE }}

            **Build type:** Incremental (append-only) — CI
            **Skills indexed:** ${{ env.FINAL_COUNT }}
            **Previous count:** ${{ env.PREV_COUNT }}
            **SHA256:** `${{ env.SHA256 }}`

            ### Install / Update

            ```bash
            python scripts/update_index.py
            ```
          files: ${{ env.ARTIFACT }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # Record this release's stats (date, count, per-source breakdown) in the
      # committed release-history log, and push it back to the default branch.
      - name: Update release log
        if: env.SKIP != 'true'
        run: |
          python pipeline/update_release_log.py
          if ! git diff --quiet -- data/release_log.jsonl docs/release-log.md; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/release_log.jsonl docs/release-log.md
            git commit -m "chore(data): log index release ${{ env.DATE }} (${{ env.FINAL_COUNT }} skills) [skip ci]"
            git push origin "HEAD:${{ github.event.repository.default_branch }}"
          fi

      - name: Delete old releases (keep latest 3)
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list \
            --repo "${{ github.repository }}" \
            --limit 100 \
            --json tagName \
            --jq '.[].tagName' \
          | grep '^index-' \
          | sort -r \
          | tail -n +4 \
          | while read -r tag; do
              echo "Deleting old release: $tag"
              gh release delete "$tag" \
                --repo "${{ github.repository }}" \
                --yes \
                --cleanup-tag
            done
