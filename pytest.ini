[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    quality: marks tests that require a real index + Ollama (deselect with -m "not quality")
    slow: marks tests that take more than 5s
    network: marks tests that make real network requests (deselect with -m "not network")

addopts = -v --tb=short -m "not quality and not network"
